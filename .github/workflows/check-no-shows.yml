name: Check No Shows

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Call Edge Function
        run: |
          curl -X POST \
            'https://fpsmtdbhvcjllnxudzjl.supabase.co/functions/v1/check-no-shows' \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H 'Content-Type: application/json' \
            -d '{}'
